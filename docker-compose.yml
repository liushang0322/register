version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: register-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    container_name: register-app
    volumes:
      - ./data:/app/data
    environment:
      - LUBAN_API_KEY=${LUBAN_API_KEY}
    restart: unless-stopped
